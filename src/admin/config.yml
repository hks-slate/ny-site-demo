backend:
  name: git-gateway
  branch: main

# For local testing without Netlify Identity, swap to:
# backend:
#   name: test-repo

media_folder: src/assets/images
public_folder: /assets/images

collections:

  - name: part-1
    label: "Part 1: Foundations"
    label_singular: Page
    folder: src/part-1
    create: true
    slug: "{{slug}}"
    fields:
      - { label: Title, name: title, widget: string }
      - label: Navigation
        name: eleventyNavigation
        widget: object
        fields:
          - { label: "Nav Label", name: key, widget: string, hint: "Text shown in the sidebar" }
          - { label: Section, name: parent, widget: hidden, default: "Part 1: Foundations" }
          - { label: Order, name: order, widget: number, default: 99 }
      - label: Body
        name: body
        widget: markdown
        hint: "Use the D3 Widget button in the toolbar to embed an interactive widget anywhere on the page."

  - name: part-2
    label: "Part 2: Market Structures"
    label_singular: Page
    folder: src/part-2
    create: true
    slug: "{{slug}}"
    fields:
      - { label: Title, name: title, widget: string }
      - label: Navigation
        name: eleventyNavigation
        widget: object
        fields:
          - { label: "Nav Label", name: key, widget: string }
          - { label: Section, name: parent, widget: hidden, default: "Part 2: Market Structures" }
          - { label: Order, name: order, widget: number, default: 99 }
      - label: Body
        name: body
        widget: markdown
        hint: "Use the D3 Widget button in the toolbar to embed an interactive widget anywhere on the page."

  - name: part-3
    label: "Part 3: Welfare & Policy"
    label_singular: Page
    folder: src/part-3
    create: true
    slug: "{{slug}}"
    fields:
      - { label: Title, name: title, widget: string }
      - label: Navigation
        name: eleventyNavigation
        widget: object
        fields:
          - { label: "Nav Label", name: key, widget: string }
          - { label: Section, name: parent, widget: hidden, default: "Part 3: Welfare & Policy" }
          - { label: Order, name: order, widget: number, default: 99 }
      - label: Body
        name: body
        widget: markdown
        hint: "Use the D3 Widget button in the toolbar to embed an interactive widget anywhere on the page."

  - name: widgets
    label: D3 Widgets
    label_singular: Widget
    folder: src/assets/widgets
    create: true
    extension: js
    format: body
    fields:
      - label: "Widget ID"
        name: title
        widget: string
        hint: "Lowercase, hyphens only — e.g. supply-demand. This becomes the filename and the data-widget value used in pages."
      - label: JavaScript Code
        name: body
        widget: code
        default_language: javascript
        allow_language_selection: false
        output_code_only: true
